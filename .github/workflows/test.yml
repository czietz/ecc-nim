name: CI

on:
  push:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          
      - name: Install Nim
        run: |
          curl https://nim-lang.org/choosenim/init.sh -sSf | sh -s -- -y
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Run the built-in self test and the test vectors
        run: |
          nim c -r ecc.nim
          nim c -r testvector.nim
          nim c -r sshcompat.nim

      - name: Check that sample code compiles without errors
        run: |
          nim c example.nim
          nim c signappl.nim

      - name: Build documentation
        run: |
          # sshcompat imports ecc, use --project to generate docs for both
          nim doc --project --outdir:"_site" sshcompat.nim
          # generate index.html redirecting to auto-generated theindex.html
          cat > "_site/index.html" <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./theindex.html">
              <title>Redirecting…</title>
            </head>
            <body>
              <p>Redirecting to <a href="./theindex.html">documentation</a>…</p>
            </body>
          </html>
          EOF

      - name: Upload documentation for later deployment
        uses: actions/upload-pages-artifact@v3
